# Runs automatically when someone opens a PR that touches configs/.
# Shows what would change on each device — review before merging.

name: Preview Changes

on:
  pull_request:
    branches: [main]
    paths:
      - "configs/**"

jobs:
  preview:
    runs-on: [self-hosted, network]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed devices
        id: detect
        run: |
          devices=$(git diff --name-only origin/main...HEAD -- configs/ \
            | sed 's|configs/||;s|\.json||' \
            | sort -u)
          echo "devices=$devices"
          echo "devices=$devices" >> $GITHUB_OUTPUT

      - name: Preview diffs
        run: |
          echo "## Config Preview" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for device in ${{ steps.detect.outputs.devices }}; do
            echo "### $device" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            python3 shim diff "$device" 2>&1 >> $GITHUB_STEP_SUMMARY || echo "  (could not reach device for live diff)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done
