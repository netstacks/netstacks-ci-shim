# This runs automatically when you open or update a PR.
# You don't trigger it. GitHub does.
#
# What it does:
#   1. Renders your templates (shim render)
#   2. Checks for conflicts (shim lint)
#   3. Commits the rendered output back to your branch
#
# After this runs, your PR shows both your YAML change
# AND the generated device config — so reviewers can see
# exactly what will go to the device.

name: Preview Config Changes

on:
  pull_request:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install jinja2 pyyaml

      # Render all stacks — produces files in rendered/
      - run: python3 shim render

      # Check for conflicts between stacks
      - run: python3 shim lint

      # Assemble per-device configs
      - run: python3 shim assemble

      # Commit rendered output back to the PR branch
      # so reviewers can see what will go to devices
      - run: |
          git config user.name "netstacks-ci-shim"
          git config user.email "ci@netstacks.io"
          git add rendered/ assembled/
          git diff --cached --quiet || git commit -m "ci: render config artifacts"
          git push
