# Runs automatically when configs/ changes on main.
# Saves a snapshot of each device BEFORE deploying (for rollback).
# Then deploys the new config.

name: Deploy to Devices

on:
  push:
    branches: [main]
    paths:
      - "configs/**"

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, network]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed devices
        id: detect
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD -- configs/ \
            | sed 's|configs/||;s|\.json||' \
            | sort -u)
          echo "devices=$changed"
          echo "devices=$changed" >> $GITHUB_OUTPUT

      - name: Snapshot before deploy
        run: |
          mkdir -p snapshots
          for device in ${{ steps.detect.outputs.devices }}; do
            echo "Snapshotting $device..."
            python3 nsci pull-snapshot "$device" || echo "  (snapshot failed, continuing)"
          done

          # Commit snapshots so rollback workflow can access them
          git config user.name "nsci"
          git config user.email "nsci@netstacks.io"
          git add snapshots/
          git diff --cached --quiet || git commit -m "ci: pre-deploy snapshots"
          git push || true

      - name: Deploy
        run: |
          changed="${{ steps.detect.outputs.devices }}"

          # Check if any stack covers these devices
          deployed_devices=""
          for stack_dir in stacks/*/; do
            [ -f "${stack_dir}stack.yaml" ] || continue
            stack_name=$(basename "$stack_dir")
            stack_devices=$(python3 -c "
          import yaml
          s = yaml.safe_load(open('${stack_dir}stack.yaml'))
          print(' '.join(s.get('devices', [])))
          ")
            match=false
            for device in $changed; do
              if echo "$stack_devices" | grep -qw "$device"; then
                match=true
                break
              fi
            done
            if [ "$match" = true ]; then
              echo ""
              echo "=== Stack: $stack_name ==="
              python3 nsci stack-deploy "$stack_name"
              deployed_devices="$deployed_devices $stack_devices"
            fi
          done

          # Deploy remaining devices independently
          for device in $changed; do
            if ! echo "$deployed_devices" | grep -qw "$device"; then
              echo ""
              echo "=== Independent: $device ==="
              python3 nsci push "$device"
            fi
          done
