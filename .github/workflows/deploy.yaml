# Runs on self-hosted runner when configs/ changes on main.
# Deploys to all affected devices in parallel with error isolation.

name: Deploy to Devices

on:
  push:
    branches: [main]
    paths:
      - "configs/**"

# Only one deploy at a time — queue subsequent pushes
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  detect:
    runs-on: [self-hosted, network]
    outputs:
      devices: ${{ steps.detect.outputs.devices }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed devices
        id: detect
        run: |
          devices=$(git diff --name-only HEAD~1 HEAD -- configs/ \
            | sed 's|configs/||;s|\.json||' \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "devices=$devices"
          echo "devices=$devices" >> $GITHUB_OUTPUT

  deploy:
    needs: detect
    if: needs.detect.outputs.devices != '[]'
    runs-on: [self-hosted, network]
    strategy:
      matrix:
        device: ${{ fromJson(needs.detect.outputs.devices) }}
      fail-fast: false    # Don't stop other devices if one fails
    steps:
      - uses: actions/checkout@v4

      - name: Deploy ${{ matrix.device }}
        run: python3 shim push ${{ matrix.device }}

      - name: Validate ${{ matrix.device }}
        run: python3 shim validate ${{ matrix.device }}
