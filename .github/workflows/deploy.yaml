# Runs on self-hosted runner when configs/ changes on main.
# The runner is on your network — it can reach devices.

name: Deploy to Devices

on:
  push:
    branches: [main]
    paths:
      - "configs/**"

jobs:
  deploy:
    runs-on: [self-hosted, network]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed devices
        id: detect
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD -- configs/ | sed 's|configs/||;s|\.json||' | sort -u)
          echo "devices=$changed"
          echo "devices=$changed" >> $GITHUB_OUTPUT

      - name: Deploy
        run: |
          for device in ${{ steps.detect.outputs.devices }}; do
            echo "=== Deploying $device ==="
            python3 shim push "$device"
          done

      - name: Validate
        run: |
          for device in ${{ steps.detect.outputs.devices }}; do
            echo "=== Validating $device ==="
            python3 shim validate "$device"
          done
