# Runs automatically when configs/ changes on main (PR merged or direct push).
# Deploys all affected devices in parallel with atomic rollback.

name: Deploy to Devices

on:
  push:
    branches: [main]
    paths:
      - "configs/**"

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, network]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed devices
        id: detect
        run: |
          devices=$(git diff --name-only HEAD~1 HEAD -- configs/ \
            | sed 's|configs/||;s|\.json||' \
            | sort -u \
            | tr '\n' ' ')
          echo "devices=$devices"
          echo "devices=$devices" >> $GITHUB_OUTPUT

      - name: Deploy
        if: steps.detect.outputs.devices != ''
        run: python3 shim deploy ${{ steps.detect.outputs.devices }}
