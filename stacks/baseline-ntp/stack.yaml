# Baseline stack — standard services pushed to all devices
#
# Independent per device — one failure doesn't affect the rest.

name: baseline
description: Baseline device standardization
atomic: false

services:
  - service: ntp
    variables:
      ntp_servers:
        - address: 10.0.0.1
          prefer: true
        - address: 10.0.0.2
        - address: 10.0.0.3
    devices:
      - rr1-nyc
      - p1-nyc
      - p2-chi
      - p3-ams
      - pe1-nyc
      - pe2-nyc
      - pe3-chi
      - pe4-dal
      # - ce1-nyc-globalbank  # temporarily offline
      - sw1-chi-techcorp

