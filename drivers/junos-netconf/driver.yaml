name: junos-netconf
transport: netconf
platform: junos

netconf:
  port: 830
  hostkey_verify: false

capabilities:
  config_replace: true
  candidate_datastore: true
  commit_confirm: true
  commit_confirm_timeout: 120
  rollback_on_error: true

yang_models:
  native: junos
  openconfig: true

# Junos supports commit-confirm via NETCONF:
#   edit-config (candidate) → commit confirmed (timeout) → validate → commit
