name: eos-eapi
transport: eapi
platform: eos

eapi:
  port: 443
  protocol: https
  verify_ssl: false

capabilities:
  config_sessions: true
  session_diff: true
  json_output: true
  config_replace: true
  commit_confirm: true
  commit_confirm_timeout: 120

# EOS eAPI supports commit-confirm via config sessions:
#   configure session → changes → commit timer <seconds> → validate → commit
