name: eos-gnmi
transport: gnmi
platform: eos

gnmi:
  port: 6030
  encoding: json_ietf
  tls: true

capabilities:
  config_replace: true
  openconfig: true
  commit_confirm: false

# EOS gNMI does not support commit-confirm natively.
# For commit-confirm behavior on EOS, use eos-eapi driver with config sessions.
