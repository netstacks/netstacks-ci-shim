name: fw-security-rule
description: Palo Alto firewall security policy rule
platforms: [paloalto]
transport: rest_api

variables:
  rule_name:
    type: string
    required: true
    description: Name of the security rule
    example: "allow-web-traffic"

  src_zones:
    type: list
    required: true
    description: Source security zones
    example: ["trust"]

  dst_zones:
    type: list
    required: true
    description: Destination security zones
    example: ["untrust"]

  src_addresses:
    type: list
    required: true
    description: Source addresses or address groups
    example: ["10.0.0.0/8"]

  dst_addresses:
    type: list
    required: true
    description: Destination addresses or address groups
    example: ["any"]

  applications:
    type: list
    required: true
    description: Application signatures to allow
    example: ["web-browsing", "ssl"]

  action:
    type: string
    required: true
    description: Rule action
    choices: [allow, deny, drop, reset-client, reset-server, reset-both]

  log_profile:
    type: string
    required: false
    description: Log forwarding profile
    default: "default"
