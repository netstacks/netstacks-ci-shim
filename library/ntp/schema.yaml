# Service: ntp
# Stack references this as: service: ntp
# Templates are selected by device driver (platform + transport)

name: ntp
description: NTP server configuration

# The OpenConfig path this service targets.
# gNMI: Set replace at this path (replaces section, not full config)
# NETCONF: edit-config with operation="replace" on this element
path: /openconfig-system:system/ntp
operation: replace

templates:
  json: template.json.j2        # gNMI (OpenConfig JSON)
  xml: template.xml.j2          # NETCONF (OpenConfig XML)

variables:
  ntp_servers:
    type: list
    required: true
    description: NTP servers to configure
    items:
      address:
        type: string
        required: true
        description: NTP server IP address
        example: "10.0.0.1"
      prefer:
        type: boolean
        required: false
        default: false
        description: Mark this server as preferred
